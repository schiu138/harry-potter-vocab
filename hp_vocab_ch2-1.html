<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HP Vocab Ch2">
<title>Harry Potter Vocab – Book 1, Ch.2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0a1e;--card:#161028;
  --accent:#c084fc;--accent2:#e879f9;--accent3:#f0abfc;
  --text:#f5f0ff;--muted:#7c6d9a;--border:#2a1f45;
  --correct:#10b981;--wrong:#ef4444;
}
body{background:var(--bg);color:var(--text);font-family:'Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;min-height:100vh;min-height:100dvh;padding:20px 16px 60px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,#2d1b69 0%,transparent 50%),radial-gradient(ellipse at 85% 85%,#4a0d6b 0%,transparent 50%);pointer-events:none;z-index:0}
#app{position:relative;z-index:1;max-width:520px;margin:0 auto}
.header{text-align:center;margin-bottom:20px}
.chapter-badge{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0d0a1e;font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;padding:4px 14px;border-radius:99px;margin-bottom:10px}
.header-title{font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--accent3),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-0.5px}
.header-sub{font-size:13px;color:var(--muted);margin-top:3px}
.tabs{display:inline-flex;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;padding:4px;margin-top:14px;gap:4px}
.tab{background:transparent;color:var(--muted);border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-family:inherit;cursor:pointer;transition:all 0.2s}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0d0a1e;font-weight:800}
.stats{display:flex;justify-content:center;gap:24px;margin-bottom:16px}
.stat{text-align:center}
.stat-num{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.cat-scroll{overflow-x:auto;margin-bottom:14px;padding-bottom:4px}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-pills{display:flex;gap:6px;width:max-content}
.cat-pill{border-radius:99px;padding:5px 13px;font-size:11px;font-family:inherit;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;transition:all 0.2s}
.cat-pill.active{font-weight:700;color:#0d0a1e}
.prog-wrap{width:100%;background:var(--border);border-radius:99px;height:5px;margin:8px 0 16px}
.prog-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.4s ease}
.card{background:linear-gradient(145deg,rgba(22,16,40,0.95),rgba(13,10,30,0.98));border:1.5px solid var(--border);border-radius:24px;padding:24px 22px;min-height:300px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 8px 40px rgba(0,0,0,0.6),inset 0 1px 0 rgba(192,132,252,0.1);cursor:pointer;transition:border-color 0.3s,box-shadow 0.3s;user-select:none;-webkit-user-select:none}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.badge{border-radius:99px;padding:3px 11px;font-size:11px;font-weight:700;letter-spacing:0.5px}
.flip-hint{font-size:11px;color:var(--muted)}
.card-front{text-align:center;padding:14px 0}
.card-emoji{font-size:44px;margin-bottom:10px}
.card-word{font-size:30px;font-weight:900;margin-bottom:4px;letter-spacing:-0.5px}
.card-pron{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:14px}
.card-simple{font-size:16px;color:var(--text);line-height:1.75;max-width:340px;margin:0 auto}
.card-back{display:flex;flex-direction:column;gap:12px;padding-top:4px}
.back-block{padding:10px 14px;border-radius:0 10px 10px 0}
.back-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;font-weight:700}
.back-text{font-size:14px;color:var(--text);line-height:1.75}
.back-text.italic{font-style:italic}
.hidden{display:none!important}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.nav-count{color:var(--muted);font-size:13px}
.btn{border-radius:12px;padding:10px 20px;font-size:14px;font-family:inherit;cursor:pointer;transition:all 0.2s;border:1.5px solid var(--border)}
.btn-prev{background:rgba(255,255,255,0.05);color:var(--text)}
.btn-prev:disabled{background:transparent;color:var(--border);cursor:not-allowed}
.btn-next{border:none;font-weight:800}
.btn-next:disabled{background:transparent!important;color:var(--border);cursor:not-allowed;border:1.5px solid var(--border)}
.browse-count{color:var(--muted);font-size:12px;margin-bottom:10px}
.browse-list{display:flex;flex-direction:column;gap:8px}
.browse-item{background:rgba(22,16,40,0.8);border:1px solid var(--border);border-radius:14px;padding:13px 15px;display:flex;align-items:center;gap:13px}
.browse-emoji{font-size:24px;flex-shrink:0}
.browse-word{font-size:16px;font-weight:800}
.browse-pron{font-size:11px;color:var(--muted);font-style:italic;margin-left:6px}
.browse-simple{font-size:13px;color:var(--text);line-height:1.6;margin-top:2px}
.quiz-header{margin-bottom:16px}
.quiz-label{font-size:14px;color:var(--muted);margin-bottom:4px}
.quiz-word{font-size:28px;font-weight:900}
.quiz-pron{font-size:12px;color:var(--muted);font-style:italic}
.quiz-opts{display:flex;flex-direction:column;gap:9px}
.quiz-opt{background:rgba(22,16,40,0.8);border:1.5px solid var(--border);border-radius:14px;padding:13px 16px;color:var(--text);font-size:14px;text-align:left;cursor:pointer;font-family:inherit;line-height:1.6;transition:all 0.25s;width:100%}
.quiz-opt.correct{background:rgba(16,185,129,0.15);border-color:var(--correct);color:var(--correct)}
.quiz-opt.wrong{background:rgba(239,68,68,0.15);border-color:var(--wrong);color:var(--wrong)}
.quiz-opt.dim{color:var(--muted)}
.btn-back{margin-top:16px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit}
.done{text-align:center;padding:32px 0}
.done-icon{font-size:56px;margin-bottom:14px}
.done-title{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--accent3),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.done-score{font-size:18px;color:var(--text);margin-bottom:8px}
.done-msg{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0d0a1e;border:none;border-radius:14px;padding:12px 30px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div><span class="chapter-badge">📚 Book 1 · Chapter 2</span></div>
    <div class="header-title">Harry Potter</div>
    <div class="header-sub">The Vanishing Glass · 145 words</div>
    <div class="tabs">
      <button class="tab active" onclick="setMode('cards')">✨ Flashcards</button>
      <button class="tab" onclick="setMode('browse')">📋 Browse</button>
      <button class="tab" onclick="setMode('quiz')">🧠 Quiz</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">-</div><div class="stat-label">Words</div></div>
    <div class="stat"><div class="stat-num" id="stat-cats">-</div><div class="stat-label">Categories</div></div>
    <div class="stat"><div class="stat-num" id="stat-progress">0%</div><div class="stat-label">Progress</div></div>
  </div>
  <div id="mode-cards">
    <div class="cat-scroll"><div class="cat-pills" id="cat-pills-cards"></div></div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="card" id="flash-card" onclick="flipCard()">
      <div class="card-top">
        <span class="badge" id="card-badge"></span>
        <span class="flip-hint" id="flip-hint">Tap to flip ✨</span>
      </div>
      <div class="card-front" id="card-front">
        <div class="card-emoji" id="card-emoji"></div>
        <div class="card-word" id="card-word"></div>
        <div class="card-pron" id="card-pron"></div>
        <div class="card-simple" id="card-simple"></div>
      </div>
      <div class="card-back hidden" id="card-back">
        <div class="back-block" id="back-block-1">
          <div class="back-label" id="back-label-1">📖 In the Book</div>
          <div class="back-text italic" id="card-example"></div>
        </div>
        <div class="back-block" style="background:rgba(255,255,255,0.04);border-radius:10px">
          <div class="back-label" style="color:var(--accent2)">💡 Why Rowling Used This</div>
          <div class="back-text" id="card-context"></div>
        </div>
      </div>
      <div></div>
    </div>
    <div class="nav">
      <button class="btn btn-prev" id="btn-prev" onclick="navigate(-1)">← Prev</button>
      <span class="nav-count" id="nav-count"></span>
      <button class="btn btn-next" id="btn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>
  <div id="mode-browse" class="hidden">
    <div class="cat-scroll"><div class="cat-pills" id="cat-pills-browse"></div></div>
    <div class="browse-count" id="browse-count"></div>
    <div class="browse-list" id="browse-list"></div>
  </div>
  <div id="mode-quiz" class="hidden">
    <div id="quiz-screen">
      <div class="prog-wrap"><div class="prog-bar" id="quiz-prog" style="width:0%"></div></div>
      <div class="quiz-header">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span class="badge" id="quiz-badge"></span>
          <span style="color:var(--muted);font-size:13px" id="quiz-num"></span>
        </div>
        <div class="quiz-label">What does this word mean?</div>
        <div class="quiz-word" id="quiz-word"></div>
        <div class="quiz-pron" id="quiz-pron"></div>
      </div>
      <div class="quiz-opts" id="quiz-opts"></div>
      <button class="btn-back" onclick="setMode('cards')">← Back to Flashcards</button>
    </div>
    <div id="quiz-done" class="done hidden">
      <div class="done-icon" id="done-icon"></div>
      <div class="done-title">Quiz Complete!</div>
      <div class="done-score" id="done-score"></div>
      <div class="done-msg" id="done-msg"></div>
      <button class="btn-primary" onclick="setMode('cards')">Back to Flashcards</button>
    </div>
  </div>
</div>
<script>
const CAT_COLORS={
  "Colours & Appearance":"#fbbf24",
  "Describing Things":"#c084fc",
  "Describing People":"#f472b6",
  "Adverbs":"#22d3ee",
  "Verbs":"#4ade80",
  "Nouns & Things":"#fb923c",
  "Nouns & People":"#e879f9",
};
function cc(c){return CAT_COLORS[c]||"#c084fc"}
const WORDS=[{"word": "Tawny", "category": "Colours & Appearance", "pronunciation": "TAW-nee", "simple": "A warm brownish-orange colour — like honey, a lion's fur, or toasted bread. Not quite brown, not quite orange.", "example": "A large tawny owl sat outside the window.", "context": "Rowling could have said 'brown owl' but tawny is more specific and beautiful. It gives you a warm golden-brown image instantly.", "emoji": "🦁"}, {"word": "Emerald", "category": "Colours & Appearance", "pronunciation": "EM-er-uld", "simple": "A rich, bright, vivid green — like the precious green gemstone of the same name. Not pale green, not dark green — jewel-bright green.", "example": "Harry's letter was written in emerald-green ink.", "context": "Emerald green is Slytherin's colour and a recurring magical colour in the series. Rowling plants it in Chapter 1 and uses it consistently throughout all 7 books.", "emoji": "💚"}, {"word": "Gleaming", "category": "Colours & Appearance", "pronunciation": "GLEEM-ing", "simple": "Shining brightly because something is very clean and polished — catching the light and throwing it back.", "example": "Dudley's new racing bicycle was gleaming in the hallway.", "context": "Gleaming things in the Dursley house are always new and expensive. They care deeply about how things look from the outside.", "emoji": "✨"}, {"word": "Ruddy", "category": "Colours & Appearance", "pronunciation": "RUD-ee", "simple": "Having a red or pinkish-red face — usually from anger, heat, or being outdoors a lot.", "example": "Vernon's face turned ruddy as his temper rose.", "context": "A ruddy face means the blood has rushed to it. Vernon goes ruddy when he's angry — which is often. Think of someone so mad their face matches a tomato.", "emoji": "🍅"}, {"word": "Pale", "category": "Colours & Appearance", "pronunciation": "PAYL", "simple": "Having very little colour — lighter than normal, almost white. Can describe skin, colours, or light.", "example": "Harry's face went pale when he first read the word 'Hogwarts.'", "context": "Going pale is what happens when blood drains from your face in shock or fear. It is the opposite of going ruddy.", "emoji": "👻"}, {"word": "Bristly", "category": "Colours & Appearance", "pronunciation": "BRIS-lee", "simple": "Short, stiff, and prickly — like the hairs on a brush, or an unshaved face.", "example": "Uncle Vernon had a large bristly mustache.", "context": "The mustache is almost its own character in Chapter 1. Bristly tells you it is not soft or neat — it is rough and aggressive, just like Vernon himself.", "emoji": "🥸"}, {"word": "Knobbly", "category": "Colours & Appearance", "pronunciation": "NOB-lee", "simple": "Having hard, uneven bumps or lumps sticking out — bumpy and irregular, not smooth.", "example": "Harry had knobbly knees from being underfed for years.", "context": "Knobbly is a wonderfully specific British word. It tells you Harry's knees are not just bony — they are pointy and irregular, a sign of poor nutrition.", "emoji": "🦴"}, {"word": "Spindly", "category": "Colours & Appearance", "pronunciation": "SPIN-dlee", "simple": "Very thin and long in a fragile, awkward way — like legs that look too thin to hold up a body.", "example": "Harry was small with spindly legs that seemed too long for his frame.", "context": "Spindly is more specific than skinny. It suggests structural fragility — like a spider's legs might snap. Another sign Harry has not been well cared for.", "emoji": "🦟"}, {"word": "Matted", "category": "Colours & Appearance", "pronunciation": "MAT-id", "simple": "Tangled and stuck together in a messy clump — hair or fur that is knotted, dirty, and pressed flat.", "example": "Harry's hair was always matted and impossible to flatten.", "context": "Matted hair is a sign of neglect. Combined with knobbly knees and too-big clothes, it builds a picture of a child nobody is properly looking after.", "emoji": "💇"}, {"word": "Tufty", "category": "Colours & Appearance", "pronunciation": "TUF-tee", "simple": "Having small uneven clumps or tufts sticking out in patches — messy and uneven.", "example": "Harry's hair was tufty and stood up in all directions.", "context": "Tufty is even more specific than messy. It means the hair grows in irregular clumps that point different ways. Harry's untameable hair becomes a symbol of magic that cannot be suppressed.", "emoji": "🌿"}, {"word": "Mouldy", "category": "Colours & Appearance", "pronunciation": "MOHL-dee", "simple": "Covered in mould — old and damp, with grey or green fungal growth and a stale smell.", "example": "Harry's cupboard had a slightly mouldy smell from years of damp.", "context": "Mouldy is a sensory detail — you can almost smell it. It makes Harry's living conditions feel real and unpleasant rather than just something you are told about.", "emoji": "🍄"}, {"word": "Rickety", "category": "Colours & Appearance", "pronunciation": "RIK-eh-tee", "simple": "Old and unsteady — wobbly and likely to fall apart at any moment if you put too much weight on it.", "example": "Harry slept on a rickety old cot in the cupboard under the stairs.", "context": "Rickety furniture belongs to people nobody cares about. Harry's rickety cot contrasts painfully with Dudley's probably very sturdy bed upstairs.", "emoji": "🪑"}, {"word": "Peculiar", "category": "Describing Things", "pronunciation": "peh-KYOOL-ee-er", "simple": "Strange in a way that is hard to explain — not normal, oddly out of place, making you stop and look twice.", "example": "There was something peculiar about the way the cat sat so perfectly still.", "context": "This is Rowling's absolute favourite word. She uses it every time something magical bleeds into the ordinary world. Once you notice it, you will see it on almost every page.", "emoji": "🤨"}, {"word": "Magnificent", "category": "Describing Things", "pronunciation": "mag-NIF-ih-sent", "simple": "Extremely impressive and grand — breathtakingly beautiful, powerful, or important.", "example": "Harry's Hogwarts letter was written on magnificent thick parchment.", "context": "Rowling contrasts the magnificent letter with the drab Dursley house on purpose. Magic is always magnificent next to their ordinariness.", "emoji": "👑"}, {"word": "Frantic", "category": "Describing Things", "pronunciation": "FRAN-tik", "simple": "Wildly anxious and out of control — rushing around in a panicked, desperate way, not thinking clearly.", "example": "Vernon made frantic attempts to intercept every letter before Harry saw them.", "context": "Frantic is panic in motion. Vernon starts Chapter 2 irritated and ends it frantic — the letters systematically destroy his composure one by one.", "emoji": "😱"}, {"word": "Hollow", "category": "Describing Things", "pronunciation": "HOL-oh", "simple": "Empty inside — having nothing in the middle. Also used for an empty, sad feeling in your chest.", "example": "Harry felt a hollow feeling inside when he thought about having no family who loved him.", "context": "Hollow is a physical word used for an emotional feeling. A hollow chest is one with no warmth or love in it — grief and loneliness described as an empty space.", "emoji": "🫙"}, {"word": "Faint", "category": "Describing Things", "pronunciation": "FAYNT", "simple": "Very slight and barely noticeable — weak, dim, or hard to detect. Almost there but not quite.", "example": "There was a faint popping sound as wizards appeared and disappeared across Britain.", "context": "Faint sounds and lights often signal magic in Rowling — it is there but just below the level of full perception. The magical world hovering at the edge of notice.", "emoji": "👻"}, {"word": "Dreadful", "category": "Describing Things", "pronunciation": "DRED-ful", "simple": "Terrible and causing fear or deep distress — much worse than just bad. Almost frightening in how bad it is.", "example": "Petunia called Harry's parents and their world 'dreadful people — her lot.'", "context": "Dreadful combines dread and awful. It is not just bad — it is something that fills you with dread. Petunia uses it for anything magical, which she both hates and fears.", "emoji": "😰"}, {"word": "Revolting", "category": "Describing Things", "pronunciation": "reh-VOLT-ing", "simple": "Disgusting — so unpleasant it makes your stomach turn. Worse than just horrible.", "example": "Harry found the way Dudley treated his presents revolting.", "context": "Revolting is stronger than disgusting. It suggests the thing goes against basic decency — morally as well as physically offensive.", "emoji": "🤢"}, {"word": "Horrid", "category": "Describing Things", "pronunciation": "HOR-id", "simple": "Very unpleasant and horrible — a very British word for something awful that you find deeply disagreeable.", "example": "'That's horrid — don't ask questions!' Aunt Petunia snapped.", "context": "Horrid is very British. Americans say horrible — British people say horrid. It sounds slightly old-fashioned but is commonly used by proper British characters like Petunia.", "emoji": "😱"}, {"word": "Ghastly", "category": "Describing Things", "pronunciation": "GAST-lee", "simple": "Horrifyingly terrible — shockingly awful, making you feel sick. Has a ghost-like quality of pale horror.", "example": "Petunia thought the idea of wizards was simply ghastly.", "context": "Ghastly comes from the same root as ghost. It is not just bad — it is pale and horrifying, like seeing something from a nightmare. One of those great British words.", "emoji": "👻"}, {"word": "Crisp", "category": "Describing Things", "pronunciation": "KRISP", "simple": "Cool, clean, and sharp — with clear edges. Used for cold fresh air or anything that feels clean and precise.", "example": "It was a crisp, clear Tuesday when Mr Dursley set off for work.", "context": "Crisp morning air signals an important scene in Rowling. The world sharpens and becomes clear when something significant is about to happen.", "emoji": "🍂"}, {"word": "Strewn", "category": "Describing Things", "pronunciation": "STROON", "simple": "Scattered messily all over a place — spread around in a disorganised, careless way.", "example": "Dudley's birthday presents were strewn all over the living room floor.", "context": "Strewn sounds more chaotic than scattered. The image is complete disorder — Dudley tearing through gifts and dropping them carelessly wherever.", "emoji": "🎁"}, {"word": "Swathed", "category": "Describing Things", "pronunciation": "SWAYTHD", "simple": "Wrapped completely in something — covered all over, enveloped from head to toe.", "example": "The stranger was swathed in a long travelling cloak.", "context": "Swathed suggests total coverage — mysterious and theatrical. Wizards in Muggle London need to be swathed to avoid standing out.", "emoji": "🧥"}, {"word": "Apparent", "category": "Describing Things", "pronunciation": "ah-PAIR-ent", "simple": "Clearly visible or obvious — easy to see or understand, not hidden.", "example": "It was apparent to Harry that the Dursleys were hiding something important.", "context": "Apparent is a formal word meaning clearly true. Harry's instincts sense the truth before his mind can name it.", "emoji": "👁️"}, {"word": "Vague", "category": "Describing Things", "pronunciation": "VAYG", "simple": "Not clear or specific — fuzzy and uncertain, hard to pin down or describe precisely.", "example": "Harry had only vague memories of his parents — just impressions of warmth and light.", "context": "Vague memories are Harry's only connection to his parents. The word captures how distant and dreamlike those impressions are — real but not clear enough to hold onto.", "emoji": "🌫️"}, {"word": "Feeble", "category": "Describing Things", "pronunciation": "FEE-bul", "simple": "Weak and unconvincing — lacking strength or power. Not effective at all.", "example": "Vernon made a feeble attempt to explain why Harry could not read his own letters.", "context": "Feeble excuses are ones nobody believes, including the person making them. Vernon knows his explanations are feeble — and that makes him even angrier.", "emoji": "😮‍💨"}, {"word": "Blazing", "category": "Describing Things", "pronunciation": "BLAY-zing", "simple": "Burning very intensely and brightly — extremely hot and bright. Also used for extreme anger.", "example": "Vernon's face was blazing red as he ripped open the letters.", "context": "Blazing red face means Vernon is at his absolute angriest. The word suggests fire — and he is about to explode.", "emoji": "🔥"}, {"word": "Enormous", "category": "Describing Things", "pronunciation": "eh-NOR-muss", "simple": "Extremely large — way beyond just big or large. Surprisingly, shockingly big.", "example": "Dudley had an enormous pile of presents but still wanted more.", "context": "Rowling uses enormous constantly for Dudley — his size, his appetite, his greed. It has become his defining word throughout the whole series.", "emoji": "🐘"}, {"word": "Gleeful", "category": "Describing People", "pronunciation": "GLEE-ful", "simple": "Full of delight and joy — especially when you are happy about something a little mischievous or at someone else's expense.", "example": "Dudley was gleeful when he realised Harry could not reach the letters.", "context": "Gleeful joy at someone else's misfortune is a character flaw. Dudley finds Harry's suffering entertaining rather than upsetting.", "emoji": "😄"}, {"word": "Thunderstruck", "category": "Describing People", "pronunciation": "THUN-der-struck", "simple": "So shocked you cannot move or speak — frozen with amazement, as if struck by lightning.", "example": "Harry was thunderstruck when he first read the words 'Hogwarts School of Witchcraft and Wizardry.'", "context": "Thunder-struck is a compound word Rowling uses for maximum shock. It is stronger than surprised or even stunned — your whole body stops.", "emoji": "⚡"}, {"word": "Baffled", "category": "Describing People", "pronunciation": "BAF-uld", "simple": "Completely confused and unable to understand — you have tried to make sense of something and simply cannot.", "example": "Harry was baffled by the strange things that kept happening around him.", "context": "Baffled is deeper than confused. It suggests you have genuinely tried to understand and failed. Harry spends most of early Book 1 baffled by his own existence.", "emoji": "😵‍💫"}, {"word": "Mutinous", "category": "Describing People", "pronunciation": "MYOO-tih-nus", "simple": "Refusing to obey — feeling rebellious and resentful inside, ready to resist authority.", "example": "Harry felt mutinous as Vernon smugly locked away the letters.", "context": "Mutinous comes from mutiny — sailors rebelling against their captain. Harry has not acted yet, but the feeling of rebellion is building quietly inside him.", "emoji": "⚓"}, {"word": "Disgruntled", "category": "Describing People", "pronunciation": "dis-GRUN-tuld", "simple": "Unhappy and dissatisfied — annoyed because things did not go the way you wanted. Grumpy and sulky.", "example": "Vernon went to bed disgruntled after failing to stop the flood of letters.", "context": "Disgruntled sounds like grunt — which fits Vernon perfectly. He is not dramatically devastated, just deeply and persistently grumpy.", "emoji": "😒"}, {"word": "Rattled", "category": "Describing People", "pronunciation": "RAT-uld", "simple": "Nervous and unsettled — shaken out of your confidence, like something loose is rattling around inside you.", "example": "Vernon was clearly rattled by the sheer number of letters arriving each day.", "context": "Rattled is the emotional result of the letters' persistence. Vernon started confident he could stop them. By the end of Chapter 2 he is rattled.", "emoji": "😨"}, {"word": "Nettled", "category": "Describing People", "pronunciation": "NET-uld", "simple": "Annoyed and irritated — stung like a stinging nettle plant. Something small that got under your skin.", "example": "Vernon felt nettled that Harry kept asking questions so calmly.", "context": "A wonderful word from the stinging nettle plant. Being nettled means something small keeps irritating you and you cannot shake it off.", "emoji": "🌿"}, {"word": "Bewildered", "category": "Describing People", "pronunciation": "beh-WIL-derd", "simple": "Completely confused and lost — so puzzled you do not know where to begin making sense of things.", "example": "Harry was bewildered when he saw his name and address on the envelope.", "context": "Bewildered is deeper than confused. Your mind goes completely blank. Harry cannot process that the magical world already knows who he is.", "emoji": "😵‍💫"}, {"word": "Smug", "category": "Describing People", "pronunciation": "SMUG", "simple": "Looking very pleased with yourself — acting as if you are better than everyone else and enjoying it.", "example": "Vernon looked smug each time he intercepted a letter before Harry could reach it.", "context": "A smug expression is the opposite of humble. Picture someone grinning because they think they have won. Vernon looks smug — but the letters keep coming.", "emoji": "😏"}, {"word": "Uneasy", "category": "Describing People", "pronunciation": "un-EE-zee", "simple": "Having a nervous, uncomfortable feeling — something feels wrong but you cannot quite say what it is.", "example": "Harry felt uneasy about the way the Dursleys refused to discuss the letters.", "context": "Uneasy is a quiet, slow discomfort — not panic, but a persistent sense that something is not right. Harry lives in a state of low-level unease in the Dursley house.", "emoji": "😟"}, {"word": "Furiously", "category": "Adverbs", "pronunciation": "FYOOR-ee-us-lee", "simple": "With extreme anger — not just angrily, but with burning, explosive rage in every movement.", "example": "Uncle Vernon shook his head furiously as Harry tried to ask about the letters.", "context": "The adverb tells you Vernon's whole body is involved — not just his face. He shakes his head so hard it is almost violent.", "emoji": "😡"}, {"word": "Greedily", "category": "Adverbs", "pronunciation": "GREED-ih-lee", "simple": "In a way that shows you want more than your fair share — grabbing and consuming hungrily.", "example": "Dudley grabbed his birthday presents greedily, counting each one twice.", "context": "One word tells you everything about Dudley's character. He does not open gifts with joy — he consumes them with greed. The adverb does the work of a whole sentence.", "emoji": "🤑"}, {"word": "Grimly", "category": "Adverbs", "pronunciation": "GRIM-lee", "simple": "In a serious, dark, and slightly threatening way — without any warmth or humour, satisfied in a cold way.", "example": "Vernon smiled grimly as he burned yet another letter.", "context": "A grim smile is not a happy smile. It is satisfied in a dark way. Vernon smiles grimly when he thinks he is winning against the magical world.", "emoji": "😬"}, {"word": "Deliberately", "category": "Adverbs", "pronunciation": "deh-LIB-er-et-lee", "simple": "On purpose — done by conscious choice, not by accident. You thought about it and decided to do it.", "example": "Vernon deliberately avoided meeting Harry's eyes at breakfast every morning.", "context": "Deliberately tells you the action was a choice. Vernon does not accidentally ignore Harry — he makes a decision to do it. That makes it crueller.", "emoji": "🎯"}, {"word": "Hastily", "category": "Adverbs", "pronunciation": "HAYS-tih-lee", "simple": "Very quickly and in a hurry — doing something fast because there is no time or you are panicking.", "example": "Vernon hastily stuffed the letters into his coat pocket before Harry could see them.", "context": "Hastily shows panic. Vernon is not smoothly intercepting letters — he is scrambling. The magical world is moving faster than he can keep up with.", "emoji": "⚡"}, {"word": "Sternly", "category": "Adverbs", "pronunciation": "STERN-lee", "simple": "In a serious, firm, and strict way — no nonsense, no warmth, no flexibility.", "example": "'You are not to mention those letters,' Vernon said sternly.", "context": "Vernon speaks sternly when he wants to shut down a conversation immediately. It is his 'do not even think about it' voice.", "emoji": "😐"}, {"word": "Stoutly", "category": "Adverbs", "pronunciation": "STOWT-lee", "simple": "In a firm, determined, and confident way — saying something strongly without backing down, even if nobody believes you.", "example": "'There is no such thing as magic!' Vernon said stoutly, folding his arms.", "context": "Stoutly is almost comical here — Vernon insists there is no magic while magic is literally raining letters on his house. The word highlights his denial perfectly.", "emoji": "💪"}, {"word": "Carelessly", "category": "Adverbs", "pronunciation": "KAIR-less-lee", "simple": "Without paying attention or caring about the consequences — doing something thoughtlessly, not minding the mess or result.", "example": "Dudley threw his presents carelessly aside once he had counted them.", "context": "Carelessly contrasts painfully with Harry's situation. Harry has almost nothing. Dudley has everything and treats it carelessly. One adverb shows the injustice without stating it.", "emoji": "🙃"}, {"word": "Reproachfully", "category": "Adverbs", "pronunciation": "reh-PROHCH-ful-ee", "simple": "In a way that shows quiet disappointment and disapproval — looking at someone as if they have let you down without shouting.", "example": "Aunt Petunia looked at Harry reproachfully whenever he asked about his parents.", "context": "Reproachfully is not anger — it is disappointed judgment. Petunia makes Harry feel guilty just by looking at him. More cutting than shouting.", "emoji": "😔"}, {"word": "Indignantly", "category": "Adverbs", "pronunciation": "in-DIG-nant-lee", "simple": "In a way that shows anger at being treated unfairly — offended and resentful because your dignity has been attacked.", "example": "'I am not a freak!' Harry said indignantly when Dudley teased him.", "context": "Indignantly is righteous anger — anger that comes from injustice. Harry uses it when his dignity is attacked. It shows he still has self-respect despite everything.", "emoji": "😤"}, {"word": "Furtively", "category": "Adverbs", "pronunciation": "FER-tiv-lee", "simple": "Secretly and cautiously — acting as if you are doing something you should not be doing and do not want to be caught.", "example": "Harry furtively tried to grab a letter before Vernon noticed.", "context": "Furtively is sneaky behaviour driven by necessity. Harry has to be furtive just to read his own mail — another sign of how controlled and unfair his life is.", "emoji": "👀"}, {"word": "Suspiciously", "category": "Adverbs", "pronunciation": "sus-PISH-us-lee", "simple": "In a way that shows you do not trust something — watching carefully as if you expect something to go wrong.", "example": "Vernon eyed the mail slot suspiciously every single morning that week.", "context": "Suspiciously is Vernon's new default mode once the letters start. He approaches his own front door like it might attack him. His paranoia is becoming total.", "emoji": "🕵️"}, {"word": "Miserably", "category": "Adverbs", "pronunciation": "MIZ-er-ah-blee", "simple": "In a very unhappy, wretched way — deeply and visibly sad, not hiding it.", "example": "Harry sat miserably in his cupboard while Dudley's birthday party went on above him.", "context": "Miserably is one of Harry's most common adverbs in early chapters. It is not dramatic misery — it is quiet, everyday misery, which is actually worse.", "emoji": "😢"}, {"word": "Anxiously", "category": "Adverbs", "pronunciation": "ANK-shus-lee", "simple": "In a worried, nervous way — with tense concern about what might happen, unable to relax.", "example": "Harry waited anxiously outside the kitchen for news about the letters.", "context": "Harry's anxiety is quiet and contained — unlike Dudley's loud tantrums. Anxiously suggests internal tension rather than outward explosion.", "emoji": "😰"}, {"word": "Numbly", "category": "Adverbs", "pronunciation": "NUM-lee", "simple": "In a dazed, unfeeling way — so shocked that your mind goes blank and you move without thinking, like a robot.", "example": "Harry sat numbly in his cupboard after Vernon destroyed the letters.", "context": "Numbly is emotional shutdown. Harry has learned to go numb when things are too painful to fully feel — a survival response he has developed over years.", "emoji": "😶"}, {"word": "Drowsily", "category": "Adverbs", "pronunciation": "DROW-zih-lee", "simple": "In a sleepy, half-awake way — moving or speaking slowly as if you are about to fall asleep.", "example": "Harry drowsily heard his aunt banging on the cupboard door to wake him.", "context": "Harry wakes drowsily — he never gets enough sleep in the Dursley house. Even his mornings begin with deprivation and the sound of impatient knocking.", "emoji": "😴"}, {"word": "Distinctly", "category": "Adverbs", "pronunciation": "dis-TINKT-lee", "simple": "Clearly and unmistakeably — in a way that leaves absolutely no room for doubt. You are certain.", "example": "Harry could distinctly remember strange things happening whenever he was very upset.", "context": "Distinctly gives a memory full clarity and certainty. Harry is not vaguely remembering — he distinctly remembers, meaning the memory is sharp, vivid, and real.", "emoji": "🔍"}, {"word": "Warily", "category": "Adverbs", "pronunciation": "WAIR-ih-lee", "simple": "In a cautious, watchful way — being careful because you sense possible danger or trouble ahead.", "example": "Vernon eyed the cat on his garden wall warily on his way to work.", "context": "Warily is cautious watching — not panic, but heightened alertness. Vernon's instincts tell him the cat is wrong. He just cannot admit why yet.", "emoji": "👁️"}, {"word": "Resolutely", "category": "Adverbs", "pronunciation": "REZ-oh-loot-lee", "simple": "In a firm and determined way — you have made a difficult decision and you are sticking to it no matter what.", "example": "Dumbledore resolutely placed baby Harry on the Dursleys' doorstep despite McGonagall's protests.", "context": "Resolutely is a word for difficult decisions made with full conviction. Dumbledore knows this is hard — and does it anyway. The word carries enormous weight.", "emoji": "💪"}, {"word": "Imperiously", "category": "Adverbs", "pronunciation": "im-PEER-ee-us-lee", "simple": "In a commanding, superior way — acting as if you are in charge and expect everyone to obey without question.", "example": "Petunia imperiously reminded Harry of his chores each morning.", "context": "Imperious comes from empire — imperial power. Petunia rules her kitchen like an empress, and Harry is her subject. One word captures their whole relationship.", "emoji": "👑"}, {"word": "Savagely", "category": "Adverbs", "pronunciation": "SAV-ij-lee", "simple": "In a fierce, violent, or cruel way — wildly and without restraint, like an animal.", "example": "Vernon savagely tore up the letters before Harry could get to them.", "context": "Savagely applied to tearing up letters is almost funny — but it shows Vernon's fear has turned into something animal. He is not calm or controlled about this.", "emoji": "🦁"}, {"word": "Rudely", "category": "Adverbs", "pronunciation": "ROOD-lee", "simple": "In a way that shows no manners or respect for others — impolitely and inconsiderately, not caring how it makes someone feel.", "example": "Dudley shoved Harry aside rudely to get to the kitchen first.", "context": "Dudley does everything rudely — it is his baseline behaviour. Rowling states it matter-of-factly, which makes it more damning than if she made a dramatic scene of it.", "emoji": "😤"}, {"word": "Peculiarly", "category": "Adverbs", "pronunciation": "peh-KYOOL-ee-er-lee", "simple": "In a strange or unusual way — oddly, in a manner that does not quite fit normal behaviour.", "example": "The cat sat peculiarly still for an animal, not moving for hours.", "context": "Rowling makes peculiar into an adverb — the cat is not just peculiar, it behaves peculiarly, which is even more unsettling. McGonagall in disguise.", "emoji": "🐱"}, {"word": "Quiver", "category": "Verbs", "pronunciation": "KWIV-er", "simple": "To shake with very small, rapid movements — a delicate trembling, much smaller and faster than a shudder. Like a leaf in a gentle breeze.", "example": "Harry felt his voice quiver as he tried to ask about his parents.", "context": "Quiver is more delicate than tremble or shudder. It suggests something barely contained — emotion trying to stay still but unable to. A very precise word.", "emoji": "🍃"}, {"word": "Snatch", "category": "Verbs", "pronunciation": "SNACH", "simple": "To grab something very quickly and rudely — not asking, just taking it fast with your hand.", "example": "Vernon snatched the letters from the mat before Harry could reach them.", "context": "Snatching is ruder than taking. It shows panic and desperation — Vernon is so afraid of those letters he stops being polite about grabbing them.", "emoji": "✋"}, {"word": "Waddle", "category": "Verbs", "pronunciation": "WOD-ul", "simple": "To walk with short steps, swaying from side to side — like a duck, or someone very overweight walking slowly.", "example": "Dudley waddled into the kitchen demanding more bacon.", "context": "Rowling uses waddled specifically for Dudley throughout the whole series. It tells you his size AND his attitude in one word — slow, heavy, and expecting to be served.", "emoji": "🦆"}, {"word": "Wheedle", "category": "Verbs", "pronunciation": "WEED-ul", "simple": "To try to get something by using a sweet, coaxing, flattering voice — being manipulatively charming to get what you want.", "example": "Dudley used a wheedling voice with his mother to squeeze extra presents out of her.", "context": "Wheedling is sneaky persuasion. Dudley does not ask honestly — he wheedles. It shows he has learned exactly how to manipulate his parents to get what he wants.", "emoji": "😇"}, {"word": "Swindle", "category": "Verbs", "pronunciation": "SWIN-dul", "simple": "To cheat or trick someone out of something — to deceive them unfairly.", "example": "Dudley complained he had been swindled when he thought he had one fewer present.", "context": "An eleven-year-old using the word swindled is funny — it is a very adult word for a childish complaint. It shows how dramatic and entitled he is.", "emoji": "😤"}, {"word": "Rummage", "category": "Verbs", "pronunciation": "RUM-ij", "simple": "To search through things messily and energetically — digging around, moving things aside carelessly while looking for something.", "example": "Vernon rummaged frantically through the post before Harry could see it.", "context": "Rummaging is undignified searching. You rummage when you are in a hurry and do not care about the mess you make. Very different from a calm, organised search.", "emoji": "🔍"}, {"word": "Creep", "category": "Verbs", "pronunciation": "KREEP", "simple": "To move very slowly and quietly — trying not to be seen or heard, making yourself small.", "example": "Harry crept downstairs before anyone else woke up to check the post.", "context": "Creeping is Harry's default way of moving in the Dursley house. He lives as invisibly as possible — always creeping, never striding. It shows his position in the household.", "emoji": "🐱"}, {"word": "Intercept", "category": "Verbs", "pronunciation": "in-ter-SEPT", "simple": "To stop something before it reaches its destination — catching it in the middle of its journey.", "example": "Vernon intercepted every single letter before Harry could get to the post.", "context": "Intercepted is a military or spy word — Vernon is running an operation to keep magic out of his house. The word makes his paranoia sound almost tactical and organised.", "emoji": "✋"}, {"word": "Peer", "category": "Verbs", "pronunciation": "PEER", "simple": "To look very carefully at something — squinting or leaning forward to see something better, concentrating hard.", "example": "Harry peered through the crack in his cupboard door at the pile of letters.", "context": "Peering is Harry's version of watching the world — through cracks, from corners, always slightly hidden. It mirrors his whole existence in the Dursley house.", "emoji": "👀"}, {"word": "Loom", "category": "Verbs", "pronunciation": "LOOM", "simple": "To appear large and threatening — to hover over something in an intimidating way, taking up space menacingly.", "example": "Vernon stood looming in the kitchen doorway, blocking Harry's path.", "context": "Characters who loom in Rowling are always trying to intimidate. Vernon looms over Harry physically to remind him of the power difference between them.", "emoji": "👤"}, {"word": "Fling", "category": "Verbs", "pronunciation": "FLING", "simple": "To throw something with force and without care — hurling it away, not placing it carefully.", "example": "Vernon flung the letters into the fire before Harry could grab even one.", "context": "Flung is more violent than threw. Vernon does not carefully discard the letters — he flings them with the full force of his fear and anger combined.", "emoji": "🔥"}, {"word": "Wail", "category": "Verbs", "pronunciation": "WAYL", "simple": "To make a long, high, sad cry — a loud moan of distress, mourning, or upset.", "example": "Dudley began to wail when told the television was being moved out of his bedroom.", "context": "Wailing is what babies do — and what Dudley does. Rowling gives him the most infantile reactions possible for an eleven-year-old to show how spoiled he is.", "emoji": "😭"}, {"word": "Splutter", "category": "Verbs", "pronunciation": "SPLUT-er", "simple": "To make explosive spitting sounds while trying to speak — coughing and stammering from shock or anger, words coming out broken.", "example": "'This — this is an OUTRAGE!' Vernon spluttered.", "context": "Spluttering is undignified speech. Vernon loses his composure so completely that words cannot come out properly. His body is as out of control as his emotions.", "emoji": "💦"}, {"word": "Stammer", "category": "Verbs", "pronunciation": "STAM-er", "simple": "To speak with involuntary pauses and repeated sounds — talking in a broken, nervous way, words catching in your throat.", "example": "'B-but who is sending them?' Harry stammered.", "context": "Stammering shows overwhelming emotion. Harry is so shocked by the letters' existence that his voice cannot keep up with his thoughts.", "emoji": "😶"}, {"word": "Tremble", "category": "Verbs", "pronunciation": "TREM-bul", "simple": "To shake in small, quick movements — from fear, cold, or strong emotion. Slightly bigger than a quiver.", "example": "Vernon's hands were trembling as he read the growing stack of letters.", "context": "Trembling hands give away what someone is trying to hide. Vernon's body reveals his fear even as his words try to project confidence and control.", "emoji": "😰"}, {"word": "Shriek", "category": "Verbs", "pronunciation": "SHREEK", "simple": "To make a loud, high-pitched scream — suddenly and sharply, usually from shock, fear, or strong surprise.", "example": "Aunt Petunia shrieked when an owl landed on her kitchen windowsill.", "context": "Shrieking is undignified and uncontrolled — exactly what Petunia, who values composure and normality above everything, most hates doing.", "emoji": "😱"}, {"word": "Stride", "category": "Verbs", "pronunciation": "STRYD", "simple": "To walk with long, confident, purposeful steps — like you know exactly where you are going and why.", "example": "Dumbledore strode down Privet Drive as if he walked there every day.", "context": "Characters who stride in Rowling are confident and purposeful. It is the opposite of how Harry moves — creeping, skirting, making himself small.", "emoji": "🚶"}, {"word": "Clutch", "category": "Verbs", "pronunciation": "KLUCH", "simple": "To hold something very tightly — gripping hard because you are scared of losing it or feeling anxious.", "example": "Petunia clutched her handbag tightly whenever she saw people in strange robes.", "context": "Clutching something is a sign of anxiety. Your hands grip harder when your mind is scared. Petunia clutches things when the magical world gets too close.", "emoji": "✊"}, {"word": "Scowl", "category": "Verbs", "pronunciation": "SKOWL", "simple": "To make an angry, disapproving frown — a dark look of displeasure aimed at someone or something.", "example": "Vernon scowled every single time he looked at Harry.", "context": "Scowling is Vernon's default expression around Harry. It signals that Harry's mere presence irritates him. He does not even need a reason — Harry existing is enough.", "emoji": "😠"}, {"word": "Glower", "category": "Verbs", "pronunciation": "GLOW-er", "simple": "To stare angrily at someone — a very dark, threatening look, more intense than a scowl.", "example": "Vernon glowered at Harry as he handed over the smallest portion of breakfast.", "context": "A glower is angrier than a stare and more intense than a frown. If scowling is a frown, glowering is a stare. Vernon basically has this as his default face.", "emoji": "😠"}, {"word": "Pester", "category": "Verbs", "pronunciation": "PES-ter", "simple": "To annoy someone repeatedly by constantly asking or bothering them — not giving up, keep coming back.", "example": "Harry kept pestering Vernon about who was sending the letters.", "context": "Pestering is persistent annoying. Harry is not just asking once — he keeps coming back, which drives Vernon further into panic and anger.", "emoji": "🪰"}, {"word": "Grope", "category": "Verbs", "pronunciation": "GROHP", "simple": "To feel around blindly with your hands — searching by touch when you cannot see clearly.", "example": "Harry was groping around in the dark cupboard for his school bag.", "context": "Groping in the dark is physical but also a metaphor for Harry's whole early life — searching blindly for things he cannot fully see or understand yet.", "emoji": "🌑"}, {"word": "Stamp", "category": "Verbs", "pronunciation": "STAMP", "simple": "To bring your foot down hard on the ground — usually in anger, to show strong feeling.", "example": "Dudley stamped his foot when told he could not have more presents.", "context": "Stamping is toddler behaviour from an eleven-year-old. Rowling gives Dudley physical tantrum actions to show how emotionally undeveloped he is despite his age.", "emoji": "👣"}, {"word": "Glint", "category": "Verbs", "pronunciation": "GLINT", "simple": "To flash with a small, brief bright light — like sunlight catching something shiny for just a moment.", "example": "There was a glint in Dumbledore's half-moon spectacles as he spoke.", "context": "A glint is smaller and more mysterious than a gleam. Dumbledore's spectacles glint — it suggests intelligence, mischief, and secret knowledge all at once.", "emoji": "✨"}, {"word": "Clatter", "category": "Verbs", "pronunciation": "KLAT-er", "simple": "To make a loud, rattling, banging noise — things hitting each other or falling with a crash.", "example": "Owls clattered against windows all across Britain that night.", "context": "Clatter is noisier and more chaotic than rattle. The owls are not quiet about their excitement — the whole country is clattering with magical news trying to get out.", "emoji": "🦉"}, {"word": "Bundle", "category": "Verbs", "pronunciation": "BUN-dul", "simple": "To wrap something up together tightly — gathering things into a compact bundle and carrying them.", "example": "Hagrid carefully bundled baby Harry in a thick warm blanket.", "context": "Bundled is a tender word for a rough giant. It shows Hagrid's gentleness — he handles baby Harry like something precious, even if he himself looks terrifying.", "emoji": "👶"}, {"word": "Dawdle", "category": "Verbs", "pronunciation": "DAW-dul", "simple": "To move or act slowly without purpose — wasting time, taking much longer than necessary.", "example": "Vernon never dawdled on his way to work — not on a day like this.", "context": "Dawdling is aimless slow movement. Vernon on this day is the complete opposite — frantic, purposeful, desperate. He has no time to dawdle.", "emoji": "🐌"}, {"word": "Linger", "category": "Verbs", "pronunciation": "LING-er", "simple": "To stay somewhere longer than expected — remaining when others have gone, reluctant to leave.", "example": "The tabby cat lingered on the garden wall all day, completely motionless.", "context": "McGonagall lingered because she was keeping watch. Her patience is extraordinary — she sat there for hours. Lingering has a sense of purpose here.", "emoji": "⏳"}, {"word": "Ponder", "category": "Verbs", "pronunciation": "PON-der", "simple": "To think carefully and slowly about something — really turning it over in your mind, giving it serious thought.", "example": "Vernon pondered all evening whether to mention the strange day to his wife.", "context": "Pondering is deeper than just thinking. It is the kind of slow, careful thinking you do when something is really bothering or confusing you.", "emoji": "🤔"}, {"word": "Protest", "category": "Verbs", "pronunciation": "proh-TEST", "simple": "To say clearly and strongly that you disagree with something — objecting out loud.", "example": "McGonagall protested when Dumbledore said he planned to leave Harry with the Dursleys.", "context": "McGonagall is not easily overruled. She protests because she cares about what happens to Harry. But Dumbledore's reasons are always larger than they first appear.", "emoji": "🙋"}, {"word": "Loathe", "category": "Verbs", "pronunciation": "LOHTH", "simple": "To hate something very intensely — much stronger and deeper than just disliking. Combined with disgust.", "example": "The Dursleys loathed anything out of the ordinary.", "context": "Loathe is one of English's strongest hate words. It suggests disgust alongside hatred — the Dursleys do not just dislike magic, they loathe it physically.", "emoji": "😤"}, {"word": "Twitch", "category": "Verbs", "pronunciation": "TWICH", "simple": "To make a small, sudden, involuntary movement — a quick, brief jerk or spasm of a body part.", "example": "The cat's tail twitched slightly as Vernon walked past it.", "context": "McGonagall as a cat twitches her tail — a tiny movement that reveals she is watching everything very carefully. A great detail for a spy in disguise.", "emoji": "🐱"}, {"word": "Glimmer", "category": "Verbs", "pronunciation": "GLIM-er", "simple": "To shine with a faint, soft, unsteady light — flickering gently, almost but not quite bright.", "example": "Something glimmered in Dumbledore's eyes as he spoke of Harry's future.", "context": "A glimmer is smaller and softer than a gleam. Dumbledore's eyes glimmer — it suggests quiet intelligence and knowledge held gently, not displayed loudly.", "emoji": "✨"}, {"word": "Hustle", "category": "Verbs", "pronunciation": "HUS-ul", "simple": "To move quickly and purposefully through a space — pushing through a crowd with energy and urgency.", "example": "Vernon hustled through the city street past the people in cloaks.", "context": "Rowling contrasts the hustling of ordinary London with the strange stillness of the cat. Ordinary life rushing past something extraordinary and not noticing.", "emoji": "🏙️"}, {"word": "Tantrum", "category": "Nouns & Things", "pronunciation": "TAN-trum", "simple": "A burst of childish rage — screaming, crying, or throwing things because you did not get what you wanted.", "example": "Dudley threw a tantrum when he thought he had one fewer present than last year.", "context": "Tantrums are for toddlers — Dudley is nearly eleven. That is the joke. He has been so spoiled he never grew out of infant behaviour.", "emoji": "😤"}, {"word": "Parchment", "category": "Nouns & Things", "pronunciation": "PARCH-ment", "simple": "A thick, cream-coloured writing material made from animal skin — used before paper existed, now rare and old-fashioned.", "example": "Harry's Hogwarts letter was written on real parchment sealed with purple wax.", "context": "Wizards use parchment instead of paper — deliberately old-fashioned. The magical world did not update its stationery when the rest of the world switched to paper.", "emoji": "📜"}, {"word": "Wax seal", "category": "Nouns & Things", "pronunciation": "WAKS SEEL", "simple": "A blob of melted wax pressed with a stamp to close an envelope officially — used in old times to show a letter is genuine.", "example": "Harry's letter was sealed with purple wax bearing a coat of arms.", "context": "Wax seals are old-fashioned and official — like a royal decree. It tells you Hogwarts takes itself very seriously and belongs to a different, older world.", "emoji": "🔏"}, {"word": "Coat of arms", "category": "Nouns & Things", "pronunciation": "KOHT of ARMZ", "simple": "An official symbol or emblem representing a family, school, or organisation — like a logo but medieval and formal.", "example": "Hogwarts' coat of arms showed a lion, a snake, an eagle, and a badger.", "context": "Real British schools and universities have coats of arms. Rowling gave Hogwarts one to make it feel authentically old, prestigious, and real.", "emoji": "🛡️"}, {"word": "Mantelpiece", "category": "Nouns & Things", "pronunciation": "MAN-tul-pees", "simple": "The shelf above a fireplace — traditionally the most important display spot in a British living room.", "example": "Vernon stood guard by the mantelpiece, blocking Harry from getting near the letters.", "context": "The mantelpiece is the heart of a traditional British living room. Vernon guarding it shows how seriously he is treating this threat to his normal life.", "emoji": "🔥"}, {"word": "Parcel", "category": "Nouns & Things", "pronunciation": "PAR-sul", "simple": "A wrapped package ready to be sent or delivered — bigger than a letter, tied or wrapped up.", "example": "Among the post were not just letters but small parcels addressed to Harry.", "context": "In Britain parcel is used where Americans say package. It sounds more old-fashioned and fits the wizarding world's postal style perfectly.", "emoji": "📦"}, {"word": "Bewilderment", "category": "Nouns & Things", "pronunciation": "beh-WIL-der-ment", "simple": "The state of being completely confused — total puzzlement, your mind unable to make sense of what is happening.", "example": "Harry stared at his letter in complete bewilderment.", "context": "Bewilderment is the noun form of bewildered. When you are in a state of bewilderment, confusion is not just a feeling — it has become your whole condition.", "emoji": "😵‍💫"}, {"word": "Exasperation", "category": "Nouns & Things", "pronunciation": "ex-as-per-AY-shun", "simple": "The state of intense frustration — being pushed so far past your limit of patience that you want to scream.", "example": "Vernon threw his hands up in exasperation as more letters kept arriving.", "context": "Exasperation is the noun form of exasperated. Vernon's whole Chapter 2 arc is a journey from irritation to full, helpless exasperation.", "emoji": "🤯"}, {"word": "Outrage", "category": "Nouns & Things", "pronunciation": "OWT-rayj", "simple": "Extreme anger at something that feels deeply unfair or shocking — righteous fury at a violation.", "example": "Vernon spluttered with outrage as thirty letters burst out of the fireplace at once.", "context": "Outrage is anger with a moral dimension. It is not just fury — it is fury at a perceived injustice. Vernon feels Hogwarts is violating his home and his rights.", "emoji": "😡"}, {"word": "Peculiarity", "category": "Nouns & Things", "pronunciation": "peh-kyool-ee-AR-ih-tee", "simple": "A strange or unusual feature about something — a specific oddness that belongs to a particular person or thing.", "example": "The cat showed a peculiarity Vernon had never seen in an animal before.", "context": "The noun form of peculiar. Rowling uses the whole family of this word — peculiar, peculiarly, peculiarity — because it perfectly captures magic leaking into ordinary life.", "emoji": "🔍"}, {"word": "Triumph", "category": "Nouns & Things", "pronunciation": "TRY-umf", "simple": "A great victory — the feeling of winning decisively after a struggle or competition.", "example": "Vernon could not hide his triumph as he successfully burned yet another letter.", "context": "Vernon's triumph is darkly comic — he thinks he is winning against Hogwarts. But the letters keep coming. His triumph is always temporary and always followed by defeat.", "emoji": "🏆"}, {"word": "Gleam", "category": "Nouns & Things", "pronunciation": "GLEEM", "simple": "A small, brief flash of light — or a brief revealing moment of emotion in someone's eyes.", "example": "There was a gleam in Dumbledore's eyes as he spoke about Harry's destiny.", "context": "A gleam in the eyes is a classic literary detail — it suggests intelligence, mischief, or secret knowledge. Dumbledore's gleam means he knows far more than he is saying.", "emoji": "✨"}, {"word": "Gust", "category": "Nouns & Things", "pronunciation": "GUST", "simple": "A sudden strong burst of wind — brief but powerful, then gone.", "example": "A gust of cold wind swept down Privet Drive as Hagrid's motorcycle descended from the sky.", "context": "Gusts in Rowling often accompany dramatic arrivals. Hagrid does not land quietly — his entrance comes with weather, which matches his enormous personality.", "emoji": "💨"}, {"word": "Rummaging", "category": "Verbs", "pronunciation": "RUM-ij-ing", "simple": "Searching through things messily and energetically — digging around, moving things aside carelessly while looking for something.", "example": "Vernon rummaged frantically through the post before Harry could see it.", "context": "Rummaging is undignified searching. You rummage when you are in a hurry and do not care about the mess you make. Very different from a calm, organised search.", "emoji": "🔍"}, {"word": "Groping", "category": "Verbs", "pronunciation": "GROH-ping", "simple": "Feeling around blindly with your hands — searching by touch when you cannot see clearly, your fingers reaching into the unknown.", "example": "Harry was groping around in the dark cupboard for his school bag.", "context": "Groping in the dark is physical but also a metaphor for Harry's whole early life — searching blindly for things he cannot fully see or understand yet.", "emoji": "🌑"}, {"word": "Twitched", "category": "Verbs", "pronunciation": "TWICHT", "simple": "Made a small, sudden, involuntary movement — a quick brief jerk of a body part that you did not choose to make.", "example": "The cat's tail twitched slightly as Vernon walked nervously past it.", "context": "McGonagall as a cat twitches her tail — a tiny movement that reveals she is watching everything very carefully. A great detail for a spy keeping watch in disguise.", "emoji": "🐱"}, {"word": "Muffled", "category": "Describing Things", "pronunciation": "MUF-uld", "simple": "Sounds that are deadened or made quieter — wrapped up so they cannot be heard clearly, like sounds coming through a wall or a pillow.", "example": "There were muffled celebrations from wizarding homes all across the country.", "context": "Muffled celebrations — the joy is there but suppressed and contained. The wizarding world is trying to hold in its excitement in a Muggle world that cannot know.", "emoji": "🤫"}, {"word": "Bundled", "category": "Verbs", "pronunciation": "BUN-duld", "simple": "Wrapped up together tightly — gathered into a compact bundle and carried carefully.", "example": "Hagrid carefully bundled baby Harry in a thick warm blanket before the journey.", "context": "Bundled is a tender word for a rough giant. It shows Hagrid's gentleness — he handles baby Harry like something precious, even though he himself looks terrifying.", "emoji": "👶"}, {"word": "Mutter", "category": "Verbs", "pronunciation": "MUT-er", "simple": "To speak very quietly under your breath — usually complaining or saying something you do not want others to hear clearly.", "example": "Vernon muttered darkly to himself all the way to work.", "context": "Muttering is not whispering — it is grumbling. You mutter when you are unhappy but not brave enough to say it out loud. Vernon mutters a lot.", "emoji": "😤"}, {"word": "Grumble", "category": "Verbs", "pronunciation": "GRUM-bul", "simple": "To complain in a low, unhappy voice — saying you are not pleased, but not loudly or directly.", "example": "Uncle Vernon grumbled about the post being late every morning.", "context": "Grumbling is gentler than shouting but more persistent. It is the sound of someone who is never quite satisfied.", "emoji": "😒"}, {"word": "Snap", "category": "Verbs", "pronunciation": "SNAP", "simple": "To say something sharply and rudely — words delivered fast and hard, like a whip cracking.", "example": "'Get up!' Aunt Petunia snapped through the cupboard door.", "context": "When someone snaps, there is zero warmth or patience. Petunia snaps at Harry because she does not think he deserves courtesy.", "emoji": "😡"}, {"word": "Bellow", "category": "Verbs", "pronunciation": "BEL-oh", "simple": "To shout very loudly in a deep, powerful voice — much louder than a regular shout, like a bull roaring.", "example": "'BOY!' Uncle Vernon bellowed up the stairs.", "context": "Only certain characters bellow — mostly big, emotional ones. Hagrid bellows from joy. Vernon bellows from anger. Dumbledore never would.", "emoji": "🐂"}, {"word": "Wince", "category": "Verbs", "pronunciation": "WINS", "simple": "To make a small, quick expression of pain or discomfort — flinching slightly when something hurts or embarrasses you.", "example": "Harry winced as Aunt Petunia grabbed his ear to drag him to the kitchen.", "context": "Wincing is small and involuntary — your face reacts before your mind does. It shows pain that Harry tries not to show fully.", "emoji": "😬"}, {"word": "Flinch", "category": "Verbs", "pronunciation": "FLINCH", "simple": "To make a sudden small movement backwards or away from something — reacting to pain or the threat of it.", "example": "Harry flinched when Vernon raised his hand suddenly.", "context": "Flinching shows a history of expecting pain. It is a deeply sad detail — Harry's body has learned to prepare for hurt.", "emoji": "😨"}, {"word": "Shrug", "category": "Verbs", "pronunciation": "SHRUG", "simple": "To raise both shoulders briefly and let them drop — a gesture that means 'I do not know' or 'I do not care.'", "example": "Harry shrugged when Dudley asked why he had no friends.", "context": "Shrugging is a physical sentence. Harry shrugs to end conversations he cannot win — it is resignation wrapped in a gesture.", "emoji": "🤷"}, {"word": "Scrub", "category": "Verbs", "pronunciation": "SKRUB", "simple": "To clean something by rubbing it hard and repeatedly — washing with strong, vigorous strokes.", "example": "Petunia spent every morning scrubbing the kitchen until it gleamed.", "context": "Petunia's obsessive scrubbing reflects her obsession with appearing clean and perfectly normal. She scrubs as if she can wash away anything magical or shameful.", "emoji": "🧹"}, {"word": "Rap", "category": "Verbs", "pronunciation": "RAP", "simple": "To knock sharply and quickly on a surface — a short, hard, impatient knock.", "example": "Aunt Petunia rapped sharply on Harry's cupboard door each morning.", "context": "Rapping is impatient knocking. Petunia does not knock gently on Harry's door — she raps. Even her knocking communicates her attitude toward him.", "emoji": "👊"}, {"word": "Shove", "category": "Verbs", "pronunciation": "SHUV", "simple": "To push someone or something roughly and rudely — a hard push without care.", "example": "Dudley shoved Harry out of the way to get through the door first.", "context": "Shoving is ruder than pushing. It is physical rudeness — using your body to show someone they do not matter to you.", "emoji": "👋"}, {"word": "Droop", "category": "Verbs", "pronunciation": "DROOP", "simple": "To hang or sink downward — to bend or drop because of heaviness, sadness, or tiredness.", "example": "Harry's shoulders drooped as he carried Dudley's cast-off bags to school.", "context": "Drooping shoulders is the physical shape of disappointment and exhaustion. Rowling uses body language to show Harry's emotional state without stating it directly.", "emoji": "😔"}, {"word": "Damp", "category": "Describing Things", "pronunciation": "DAMP", "simple": "Slightly wet — not soaking, but moist and cold in an unpleasant way.", "example": "The cupboard under the stairs was dark and damp.", "context": "Damp is worse than just wet in a way — it is persistently, clammily unpleasant. You cannot dry out something damp easily. Harry lives in damp conditions.", "emoji": "💧"}, {"word": "Dim", "category": "Describing Things", "pronunciation": "DIM", "simple": "Not bright — having very little light, gloomy and hard to see in.", "example": "Harry did his homework by the dim light that crept under the cupboard door.", "context": "Dim light is not quite dark — it is just enough to see but not enough to see well. Harry exists in dim conditions — physically and metaphorically.", "emoji": "🕯️"}, {"word": "Cramped", "category": "Describing Things", "pronunciation": "KRAMPT", "simple": "Too small and tight — not enough space to move or stretch comfortably.", "example": "Harry's cupboard was so cramped he could not stand up straight in it.", "context": "Cramped is physical discomfort. The cupboard is cramped. Harry's whole life with the Dursleys is cramped — squeezed into a space too small for him.", "emoji": "📦"}, {"word": "Gloomy", "category": "Describing Things", "pronunciation": "GLOOM-ee", "simple": "Dark and depressing — the kind of place or day that makes you feel sad just by being in it.", "example": "The cupboard under the stairs was gloomy and smelled of old shoes.", "context": "Gloomy is atmosphere made of darkness and sadness combined. Even the word sounds heavy. Harry's cupboard is the gloomiest place in an already gloomy house.", "emoji": "🌑"}, {"word": "Bony", "category": "Describing Things", "pronunciation": "BOH-nee", "simple": "Very thin, with the bones visible under the skin — not in a healthy way, more like underfed.", "example": "Harry had a thin, bony face with bright green eyes.", "context": "Bony is different from slim or slender — it implies you can see the structure beneath the skin. Another sign that Harry has not been properly fed or cared for.", "emoji": "🦴"}, {"word": "Crooked", "category": "Describing Things", "pronunciation": "CROOK-id", "simple": "Not straight — bent, curved, or twisted out of its proper shape.", "example": "Harry had a crooked scar on his forehead shaped like a lightning bolt.", "context": "Crooked is a common English word but very specific. A crooked scar is not just a scar — it has a bent, irregular shape. Harry's scar is crooked and distinctive.", "emoji": "⚡"}, {"word": "Ordinary", "category": "Describing Things", "pronunciation": "OR-dih-nair-ee", "simple": "Normal, average, nothing special — the most standard, unremarkable version of something.", "example": "The Dursleys were proud to say they were perfectly ordinary.", "context": "Rowling repeats ordinary throughout Chapter 1 on purpose. The Dursleys are obsessed with being ordinary — which makes the extraordinary interruption of magic so dramatic.", "emoji": "🏘️"}, {"word": "Scrawny", "category": "Describing Things", "pronunciation": "SKRAW-nee", "simple": "Very thin and bony in an unhealthy way — underfed and weak-looking, not athletic thin.", "example": "Harry was small and scrawny for his age, with knobbly knees.", "context": "Scrawny is not a kind word for thin. It suggests the thinness comes from deprivation rather than health. One word tells you Harry has not been properly looked after.", "emoji": "🦴"}, {"word": "Peaky", "category": "Describing Things", "pronunciation": "PEE-kee", "simple": "Looking pale, tired, and unwell — not sick exactly, but not healthy either. A very British word.", "example": "Harry looked a bit peaky after another night in his cold cupboard.", "context": "Peaky is a wonderfully British word. Americans might say 'under the weather' — British people say peaky. It perfectly describes someone who is not quite ill but definitely not well.", "emoji": "😶"}, {"word": "Rapped", "category": "Verbs", "pronunciation": "RAPT", "simple": "Knocked sharply and quickly — a short hard knock, usually impatient.", "example": "Aunt Petunia rapped on the cupboard door at six in the morning.", "context": "Rapped knocking is impatient and dismissive. You rap on a door when the person inside does not deserve a gentle knock.", "emoji": "👊"}, {"word": "Sneered", "category": "Verbs", "pronunciation": "SNEERD", "simple": "Smiled in a mean, contemptuous way — a smile that shows you think you are better than someone.", "example": "Dudley sneered at Harry's second-hand school bag.", "context": "A sneer is a twisted, unkind smile. It communicates contempt — I am better than you and I want you to know it. Dudley sneers; Draco Malfoy later does it even more.", "emoji": "😏"}, {"word": "Jeered", "category": "Verbs", "pronunciation": "JEERD", "simple": "Made mocking, taunting comments — laughing at someone or calling out cruel things to embarrass them.", "example": "Dudley's gang jeered at Harry whenever they passed him in the corridor.", "context": "Jeering is group mockery — usually done publicly to humiliate someone. It is one step beyond sneering, which is just a look.", "emoji": "😈"}, {"word": "Bounded", "category": "Verbs", "pronunciation": "BOWN-did", "simple": "Moved with big, energetic, bouncing leaps — jumping forward with enthusiasm and energy.", "example": "Dudley bounded down the stairs on his birthday, excited for his presents.", "context": "Bounding is joyful, energetic movement — the opposite of how Harry moves in the same house. The contrast tells you everything about their different positions.", "emoji": "🦘"}, {"word": "Slunk", "category": "Verbs", "pronunciation": "SLUNK", "simple": "Moved quietly and sneakily — trying not to be noticed, moving close to walls or in shadows.", "example": "Harry slunk into the kitchen trying not to attract attention.", "context": "Slunk is even more furtive than crept. It suggests shame or fear — an animal movement, low and hidden. Harry slinks through his own home like a guilty person.", "emoji": "🐈"}, {"word": "Wrenched", "category": "Verbs", "pronunciation": "RENCHT", "simple": "Pulled or twisted something away violently — a sudden, forceful grab that twists as it pulls.", "example": "Vernon wrenched the letters away from Harry before he could read a word.", "context": "Wrenched is more violent than grabbed. It suggests desperation — Vernon is using his whole body and strength to keep magic away from his house.", "emoji": "💪"}, {"word": "Brandished", "category": "Verbs", "pronunciation": "BRAN-disht", "simple": "Waved something around in a threatening or dramatic way — holding it up and moving it to make a point.", "example": "Vernon burst in brandishing the morning post at Harry like a weapon.", "context": "You brandish a weapon — or something you are treating as one. Vernon treats the letters like a threat, and handles them like one too.", "emoji": "⚔️"}, {"word": "Intercepted", "category": "Verbs", "pronunciation": "in-ter-SEP-ted", "simple": "Stopped something before it reached its destination — catching it in the middle of its journey.", "example": "Vernon intercepted every single letter before Harry could get to the post.", "context": "Intercepted is a military or spy word — Vernon is running an operation to keep magic out. The word makes his paranoia sound almost tactical.", "emoji": "✋"}, {"word": "Pleading", "category": "Verbs", "pronunciation": "PLEED-ing", "simple": "Begging urgently and with strong emotion — asking desperately, making clear how much you need something.", "example": "'Please, just let me read one,' Harry said, pleading with Vernon.", "context": "Pleading is more desperate than asking. Harry has almost nothing — a letter addressed specifically to him feels enormously important and worth begging for.", "emoji": "🙏"}, {"word": "Hovering", "category": "Verbs", "pronunciation": "HUV-er-ing", "simple": "Staying in one place in the air without moving — floating and waiting, or standing very close and watchfully.", "example": "Vernon hovered near the mail slot every morning that week.", "context": "Hovering suggests nervous, watchful waiting. Vernon cannot walk away — he has to stay close to the threat. His anxiety keeps him physically close to what he fears.", "emoji": "🚁"}, {"word": "Prodded", "category": "Verbs", "pronunciation": "PROD-id", "simple": "Poked someone or something with a finger or pointed object — a sharp, jabbing push to get attention or to move something.", "example": "Dudley prodded Harry with his foot as he lay on the cupboard floor.", "context": "Prodding is contemptuous physical contact — you prod an animal or an object, not someone you respect. Dudley treats Harry as less than human with this gesture.", "emoji": "👆"}];
const seen=new Set();
const WW=WORDS.filter(w=>{const k=w.word.toLowerCase()+"||"+w.category;if(seen.has(k))return false;seen.add(k);return true});
const CATS=["All",...new Set(WW.map(w=>w.category))];
document.getElementById("stat-cats").textContent=CATS.length-1;
document.getElementById("stat-total").textContent=WW.length;
// Fix subtitle
document.querySelector(".header-sub").textContent="The Vanishing Glass · "+WW.length+" words";
let mode="cards",ci=0,flipped=false,ccat="All",bcat="All";
let qpool=[],qopts=[],qi=0,qs=0,qsel=null,maxSeen=0;
function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}
function fw(cat){return cat==="All"?WW:WW.filter(w=>w.category===cat)}
function pills(id,active,fn){
  const el=document.getElementById(id);el.innerHTML="";
  CATS.forEach(c=>{
    const b=document.createElement("button");
    b.className="cat-pill"+(c===active?" active":"");
    b.textContent=c;
    const col=cc(c);
    if(c===active){b.style.background=col;b.style.color="#0d0a1e";b.style.borderColor=col}
    b.onclick=()=>fn(c);el.appendChild(b);
  });
}
function setMode(m){
  ["cards","browse","quiz"].forEach(id=>document.getElementById("mode-"+id).classList.toggle("hidden",id!==m));
  document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",["cards","browse","quiz"][i]===m));
  mode=m;
  if(m==="cards")render();
  if(m==="browse")renderBrowse();
  if(m==="quiz")startQuiz();
}
function render(){
  pills("cat-pills-cards",ccat,c=>{ccat=c;ci=0;flipped=false;render()});
  const words=fw(ccat),idx=Math.min(ci,words.length-1),w=words[idx];
  if(!w)return;
  const col=cc(w.category);
  maxSeen=Math.max(maxSeen,idx+1);
  document.getElementById("stat-progress").textContent=Math.round((maxSeen/WW.length)*100)+"%";
  document.getElementById("prog-bar").style.width=Math.round(((idx+1)/words.length)*100)+"%";
  document.getElementById("nav-count").textContent=(idx+1)+" / "+words.length;
  const badge=document.getElementById("card-badge");
  badge.textContent=w.category;badge.style.background=col+"22";badge.style.color=col;badge.style.border="1px solid "+col+"44";
  const card=document.getElementById("flash-card");
  card.style.borderColor=flipped?col+"88":"var(--border)";
  card.style.boxShadow=flipped?"0 0 40px "+col+"33":"0 8px 40px rgba(0,0,0,0.6)";
  document.getElementById("card-emoji").textContent=w.emoji;
  document.getElementById("card-word").textContent=w.word;
  document.getElementById("card-word").style.color=col;
  document.getElementById("card-pron").textContent=w.pronunciation;
  document.getElementById("card-simple").textContent=w.simple;
  document.getElementById("back-block-1").style.background=col+"15";
  document.getElementById("back-block-1").style.borderLeft="3px solid "+col;
  document.getElementById("back-label-1").style.color=col;
  document.getElementById("card-example").textContent='"'+w.example+'"';
  document.getElementById("card-context").textContent=w.context;
  document.getElementById("card-front").classList.toggle("hidden",flipped);
  document.getElementById("card-back").classList.toggle("hidden",!flipped);
  document.getElementById("flip-hint").textContent=flipped?"Tap to flip back":"Tap to flip ✨";
  const nb=document.getElementById("btn-next"),pb=document.getElementById("btn-prev");
  pb.disabled=idx===0;nb.disabled=idx===words.length-1;
  nb.style.background=idx===words.length-1?"transparent":"linear-gradient(135deg,"+col+",var(--accent2))";
  nb.style.color=idx===words.length-1?"var(--border)":"#0d0a1e";
}
function flipCard(){flipped=!flipped;render()}
function navigate(d){const words=fw(ccat);ci=Math.max(0,Math.min(words.length-1,ci+d));flipped=false;render()}
function renderBrowse(){
  pills("cat-pills-browse",bcat,c=>{bcat=c;renderBrowse()});
  const words=fw(bcat);
  document.getElementById("browse-count").textContent=words.length+" words";
  const list=document.getElementById("browse-list");list.innerHTML="";
  words.forEach(w=>{
    const col=cc(w.category),item=document.createElement("div");
    item.className="browse-item";
    item.innerHTML=`<div class="browse-emoji">${w.emoji}</div><div style="flex:1;min-width:0"><div><span class="browse-word" style="color:${col}">${w.word}</span><span class="browse-pron">${w.pronunciation}</span></div><div class="browse-simple">${w.simple}</div></div>`;
    list.appendChild(item);
  });
}
function startQuiz(){
  qpool=shuffle(WW).slice(0,10);
  qopts=qpool.map(q=>shuffle([...shuffle(WW.filter(w=>w.word!==q.word||w.category!==q.category)).slice(0,3),q]));
  qi=0;qs=0;qsel=null;
  document.getElementById("quiz-screen").classList.remove("hidden");
  document.getElementById("quiz-done").classList.add("hidden");
  renderQuiz();
}
function renderQuiz(){
  const q=qpool[qi],col=cc(q.category);
  document.getElementById("quiz-prog").style.width=Math.round((qi/qpool.length)*100)+"%";
  const b=document.getElementById("quiz-badge");
  b.textContent=q.category;b.style.background=col+"22";b.style.color=col;b.style.border="1px solid "+col+"44";
  document.getElementById("quiz-num").textContent="Q"+(qi+1)+" of "+qpool.length;
  document.getElementById("quiz-word").textContent=q.emoji+" "+q.word;
  document.getElementById("quiz-word").style.color=col;
  document.getElementById("quiz-pron").textContent=q.pronunciation;
  const opts=document.getElementById("quiz-opts");opts.innerHTML="";
  qopts[qi].forEach(opt=>{
    const btn=document.createElement("button");
    btn.className="quiz-opt";btn.textContent=opt.simple;
    btn.onclick=()=>pick(opt);opts.appendChild(btn);
  });
}
function pick(opt){
  if(qsel)return;
  qsel=opt.word+"||"+opt.category;
  const q=qpool[qi],correct=opt.word===q.word&&opt.category===q.category;
  if(correct)qs++;
  document.querySelectorAll(".quiz-opt").forEach((b,i)=>{
    const o=qopts[qi][i],c=o.word===q.word&&o.category===q.category,s=o.word+"||"+o.category===qsel;
    if(c)b.classList.add("correct");else if(s)b.classList.add("wrong");else b.classList.add("dim");
  });
  setTimeout(()=>{qsel=null;qi++;if(qi>=qpool.length)done();else renderQuiz()},1000);
}
function done(){
  document.getElementById("quiz-screen").classList.add("hidden");
  document.getElementById("quiz-done").classList.remove("hidden");
  const pct=Math.round((qs/qpool.length)*100);
  document.getElementById("done-icon").textContent=pct>=80?"🏆":pct>=60?"⭐":"📚";
  document.getElementById("done-score").innerHTML='<span style="color:var(--accent2);font-weight:700">'+qs+'</span> / <span style="color:var(--accent2);font-weight:700">'+qpool.length+'</span> correct';
  document.getElementById("done-msg").textContent=pct>=80?"Outstanding! Rowling would be impressed.":pct>=60?"Good work — Chapter 2 is yours!":"Keep studying — it all clicks with reading!";
}
render();
</script>
</body>
</html>
